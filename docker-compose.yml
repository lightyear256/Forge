version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mongodb:
    image: mongo:7-jammy
    command: ["mongod", "--quiet", "--logpath", "/dev/null"]
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://admin:password123@mongodb:27017/codeexecution?authSource=admin
      REDIS_HOST: redis  
      REDIS_PORT: 6379
      JWT_SECRET: hello_editordbwekvad
      NODE_ENV: production
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp:/tmp
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ayushmaan194/forge-frontend:latest
    ports:
    - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "https://forge.api.ayushmaan.tech"
      NEXT_PUBLIC_WS_URL: "wss://forge.api.ayushmaan.tech"



    depends_on:
      - backend
    restart: unless-stopped

volumes:
  redis_data:
  mongodb_data: