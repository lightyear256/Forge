version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: forge-redis
    pull_policy: if_not_present  # Prevents Docker Hub rate limit
    restart: unless-stopped
    
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    
    ports:
      - "6379:6379"
    
    volumes:
      - redis_data:/data
    
    command: redis-server --maxmemory 200mb --maxmemory-policy noeviction
    
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  mongodb:
    image: mongo:7-jammy
    container_name: forge-mongodb
    pull_policy: if_not_present  # Prevents Docker Hub rate limit
    restart: unless-stopped
    
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    
    command: ["mongod", "--quiet", "--logpath", "/dev/null"]
    
    ports:
      - "27017:27017"
    
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    
    volumes:
      - mongodb_data:/data/db
    
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build: ./backend
    container_name: forge-backend
    pull_policy: if_not_present
    restart: unless-stopped
    
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
          pids: 200
        reservations:
          cpus: '0.5'
          memory: 512M
    
    ports:
      - "5000:5000"
    
    env_file:
    - ./backend/.env
    
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - backend_tmp:/tmp
    
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 240s
    
    security_opt:
      - no-new-privileges:true
    
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
      
  frontend:
    # image: ayushmaan194/forge-frontend:frontend-image
    # container_name: forge-frontend
    # pull_policy: if_not_present  # Prevents Docker Hub rate limit
    # restart: unless-stopped

    container_name: forge-frontend
    restart: unless-stopped
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}

    # container_name: forge-frontend
    pull_policy: if_not_present
    # restart: unless-stopped
    
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    
    ports:
      - "3000:3000"
    
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}

    # env_file:
    # - ./frontend/.env.local
    
    depends_on:
      backend:
        condition: service_healthy
    
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  redis_data:
  mongodb_data:
  backend_tmp: