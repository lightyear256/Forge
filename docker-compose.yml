version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: forge-redis
    pull_policy: if_not_present  # Prevents Docker Hub rate limit
    restart: unless-stopped
    
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    
    ports:
      - "6379:6379"
    
    volumes:
      - redis_data:/data
    
    command: redis-server --maxmemory 200mb --maxmemory-policy allkeys-lru
    
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  mongodb:
    image: mongo:7-jammy
    container_name: forge-mongodb
    pull_policy: if_not_present  # Prevents Docker Hub rate limit
    restart: unless-stopped
    
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    
    command: ["mongod", "--quiet", "--logpath", "/dev/null"]
    
    ports:
      - "27017:27017"
    
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    
    volumes:
      - mongodb_data:/data/db
    
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build: ./backend
    container_name: forge-backend
    pull_policy: if_not_present  # Prevents Docker Hub rate limit
    restart: unless-stopped
    
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
          pids: 200  # Limits spawned containers
        reservations:
          cpus: '0.5'
          memory: 512M
    
    ports:
      - "5000:5000"
    
    environment:
      PORT: 5000
      MONGO_URI: mongodb://admin:password123@mongodb:27017/codeexecution?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: hello_editordbwekvad
      NODE_ENV: production
    
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - backend_tmp:/tmp  # Changed from /tmp:/tmp to prevent disk filling
    
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    security_opt:
      - no-new-privileges:true
    
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: ayushmaan194/forge-frontend:latest
    container_name: forge-frontend
    pull_policy: if_not_present  # Prevents Docker Hub rate limit
    restart: unless-stopped
    
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    
    ports:
      - "3000:3000"
    
    environment:
      NEXT_PUBLIC_API_URL: "https://forge.api.ayushmaan.tech"
      NEXT_PUBLIC_WS_URL: "wss://forge.api.ayushmaan.tech"
    
    depends_on:
      backend:
        condition: service_healthy
    
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  redis_data:
  mongodb_data:
  backend_tmp:  # New volume for backend tmp files